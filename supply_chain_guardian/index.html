<!-- BACKEND DEMO INJECTION (added by assistant) - backup created as index.html.bak -->
<div id="backend-demo" style="position:fixed;right:12px;bottom:12px;background:white;border:1px solid #ddd;padding:12px;z-index:9999;border-radius:8px;font-family:Arial">
  <h4 style="margin:0 0 8px 0">Backend Demo</h4>
  <button onclick="fetch('/api/health').then(r=>r.json()).then(j=>alert(JSON.stringify(j)))">Health</button>
  <button onclick="fetch('/api/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'demo',value:Math.random()})}).then(r=>r.json()).then(j=>alert(JSON.stringify(j)))">Add Item</button>
  <button onclick="fetch('/api/items').then(r=>r.json()).then(j=>alert(JSON.stringify(j)))">List Items</button>
  <div style="margin-top:8px">
    <button onclick="demoCNN()">Demo CNN</button>
    <button onclick="demoGNN()">Demo GNN</button>
  </div>
</div>
<script>
function demoCNN(){
  fetch('/api/predict_cnn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({array:[1,2,3,4,5], use_torch:false})})
    .then(r=>r.json()).then(j=>alert(JSON.stringify(j)));
}
function demoGNN(){
  fetch('/api/predict_gnn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adj:[[0,1,0],[1,0,1],[0,1,0]], features:[[1,0],[0,1],[1,1]], use_torch:false})})
    .then(r=>r.json()).then(j=>alert(JSON.stringify(j)));
}
</script>
